; =============================================================================
; Orbital Temple Witnesses Sculptures
; 02 - Witness Sculpture (Searching/Tracking behavior)
; =============================================================================

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Partition scheme with more space for OTA updates (optional)
; board_build.partitions = min_spiffs.csv
