; =============================================================================
; Orbital Temple Witnesses Sculptures
; 05 - WiFi Motor Control (Velocity & Angle)
; =============================================================================

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    bblanchon/ArduinoJson@^7.0.0

; Optional: Enable OTA after WiFi is configured
; upload_protocol = espota
; upload_port = witness-ctrl.local
