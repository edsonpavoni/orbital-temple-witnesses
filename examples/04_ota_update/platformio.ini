; =============================================================================
; Orbital Temple Witnesses Sculptures
; 04 - OTA Update Example (Wireless Code Updates)
; =============================================================================

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; OTA upload configuration (after first USB upload)
; Uncomment these lines and update the IP after WiFi connects:
; upload_protocol = espota
; upload_port = 192.168.1.XXX
; Or use mDNS name:
; upload_port = witness-ota.local

board_build.partitions = min_spiffs.csv
