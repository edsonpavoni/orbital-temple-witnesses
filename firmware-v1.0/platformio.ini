; =============================================================================
; First Witness — 17_witness_choreography_smooth
; Speed-brake 1800 CW spin: enter-sat(8s) -> hold(30s) -> spin(~42s) -> hold(30s)
; =============================================================================

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
