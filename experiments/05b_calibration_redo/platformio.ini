; =============================================================================
; First Witness — calibration sketch (no auto-home, no network, no tracking)
; =============================================================================
; Use this sketch to find a fresh mass_offset_deg after the sculpture has
; been fully mounted. Boots into idle so the auto-home cannot run with a
; stale calibration. Same NVS namespace as the production firmware, so a
; `savecal` here carries over when you flash 14_witness_provision back.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
