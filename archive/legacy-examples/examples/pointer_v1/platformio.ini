; Witness · pointer_v1
; Fresh start. Position-mode pointer driven by serial-typed angles.
; Boot encoder reading = 0 deg. Type "0".."360" to slew slowly to that angle.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_flags = --no-stub

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5UnitRoller library is in lib/ folder
