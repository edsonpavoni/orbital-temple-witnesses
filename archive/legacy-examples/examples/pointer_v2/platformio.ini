; Witness · pointer_v2
; Compromise build: position mode for homing/locking, speed mode with sine
; velocity curve (Jan 24 / 03_first_witness recipe) for the smooth 360.
; Press 'g' to run the full sequence: home -> 360 -> lock at X.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_flags = --no-stub

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5UnitRoller library is in lib/ folder
