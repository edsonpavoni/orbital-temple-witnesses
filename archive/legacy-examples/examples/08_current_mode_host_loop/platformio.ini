; Witness · 08_current_mode_host_loop (Path C, Milestone 1)
; Enter MODE_CURRENT, 200 Hz host loop skeleton, zero current command.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_flags = --no-stub

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5UnitRoller library is in lib/ folder
