; Witness · MODE_POS_SPEED (hidden mode 5) test
; Cascaded position + speed control with built-in 2 Hz low-pass filter.
; This is the mode the M5 library does NOT expose but the motor firmware supports.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_flags = --no-stub

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5UnitRoller library is in lib/ folder
