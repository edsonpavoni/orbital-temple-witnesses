; PlatformIO Project Configuration File
;
; ORBITAL TEMPLE WITNESS - SMOOTH MOTION TUNER
;
; Build: pio run
; Upload: pio run -t upload
; Monitor: pio device monitor

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Serial monitor
monitor_speed = 115200

; Upload settings (fix for ESP32-S3 native USB)
upload_speed = 115200
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes

; Build flags
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
lib_deps =
    ; None needed for basic motor control
