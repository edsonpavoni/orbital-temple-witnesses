; Witness · 09_motor_modes_explorer_MONO
; Pre-refactor monolithic version of 09_motor_modes_explorer, kept side by
; side for A/B testing. Same behavior, single src/main.cpp.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_flags = --no-stub

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5UnitRoller library is in lib/ folder
