; Witness · Encoder calibration + position-hold verification
; Uses M5UnitRoller library. Sculpture must be flat on table during calibration.
; Keeps USB-CDC serial ON (we want feedback). Flip CDC_ON_BOOT=0 only for PD standalone.

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5UnitRoller library is in lib/ folder
